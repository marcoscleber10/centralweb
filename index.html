<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentralWeb • Hub da Internet + DeFi + Meteorologia + Sentient Radar</title>
    <!-- Font Awesome 6 (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0c0c14;
            color: #eaeef2;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 1rem;
        }

        body.light-mode {
            background: #f0f2f5;
            color: #1e1e2f;
        }

        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        body.light-mode .card-moderno {
            background: white;
            border: 1px solid #ddd;
        }

        body.light-mode .pool-item {
            background: rgba(0, 0, 0, 0.05);
        }

        body.light-mode .sentient-card {
            background: rgba(0, 0, 0, 0.03);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(20, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.2rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            background: rgba(20, 22, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #7b8cff, #c07cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-global {
            flex: 1;
            min-width: 260px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
        }

        .search-global i {
            color: #9aa0b0;
            font-size: 1.2rem;
            margin-right: 0.8rem;
        }

        .search-global input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 0.6rem 0;
            color: inherit;
            font-size: 1rem;
            outline: none;
        }

        .search-global input::placeholder {
            color: #7f8596;
        }

        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 32, 45, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            margin-top: 0.5rem;
            padding: 0.8rem 0;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            display: none;
        }
        .search-suggestions div {
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .search-suggestions div:hover {
            background: rgba(255,255,255,0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .header-actions button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.light-mode .header-actions button {
            background: rgba(0,0,0,0.05);
            color: #333;
            border-color: rgba(0,0,0,0.1);
        }

        .header-actions button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.07);
        }

        .clock {
            background: rgba(255,255,255,0.08);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .crypto-widget {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: rgba(0,0,0,0.3);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            align-items: center;
        }
        .crypto-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .crypto-item i {
            font-size: 1rem;
        }
        .crypto-item span:last-child {
            font-weight: 600;
            color: #7bff9c;
        }

        .favorites-bar {
            background: rgba(25, 28, 40, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 1rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .favorites-title {
            font-size: 1rem;
            color: #b5bcd0;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }
        .favorites-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .favorite-item {
            background: rgba(255,255,255,0.1);
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .favorite-item:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .favorite-item i:first-child {
            font-size: 1.3rem;
            color: #ffb347;
        }
        .favorite-item .fa-times-circle {
            color: #ff7b7b;
            font-size: 1rem;
            margin-left: 0.5rem;
        }

        .projects-section {
            margin-bottom: 2rem;
        }
        .projects-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffd966;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .project-item {
            background: linear-gradient(145deg, #2a2f4b, #1e2235);
            border-radius: 28px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
            border: 1px solid #4a4f70;
            transition: 0.2s;
            cursor: pointer;
        }
        .project-item:hover {
            transform: translateY(-4px);
            border-color: #7b8cff;
            box-shadow: 0 10px 20px #1e1e3f;
        }
        .project-item i {
            font-size: 2rem;
            color: #7b8cff;
        }
        .project-item span {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .project-item small {
            font-size: 0.8rem;
            color: #aab6fe;
        }

        .daily-section {
            margin-bottom: 2rem;
        }
        .daily-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .daily-title i {
            color: #fbbf24;
        }
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .daily-item {
            background: rgba(40, 45, 60, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
            cursor: pointer;
        }
        .daily-item:hover {
            transform: translateY(-4px);
            background: rgba(55, 60, 80, 0.8);
            border-color: #7b8cff;
        }
        .daily-item i {
            font-size: 2.2rem;
            color: #a0b0ff;
        }
        .daily-item span {
            font-weight: 500;
        }

        /* CARDS FINANCEIROS */
        .financas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .card-financeiro {
            background: rgba(25, 28, 40, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.15);
            transition: transform 0.2s;
        }
        .card-financeiro:hover {
            transform: translateY(-5px);
        }
        .card-financeiro h3 {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.4rem;
            margin-bottom: 1rem;
            color: #ffd966;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            opacity: 0.8;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 0.7rem;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: inherit;
            font-size: 1rem;
        }
        button.primario {
            background: #7b8cff;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            margin-right: 0.6rem;
            transition: 0.2s;
        }
        button.secundario {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            color: inherit;
            transition: 0.2s;
        }
        button.primario:hover, button.secundario:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .resultado {
            margin-top: 1rem;
            background: rgba(0,0,0,0.3);
            border-radius: 28px;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            font-size: 1.3rem;
        }
        .detalhe-taxa {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.5rem;
            color: #aab6fe;
        }
        hr {
            margin: 1rem 0;
            border-color: rgba(255,255,255,0.1);
        }

        /* LIQUIDITY POOL ANALYTICS */
        .pool-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
        }
        .pool-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .pool-header h3 {
            color: #ffd966;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .pool-search {
            flex: 1;
            min-width: 250px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 1.5rem;
        }
        .pool-search i {
            color: #9aa0b0;
            margin-right: 0.8rem;
        }
        .pool-search input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 0.5rem 0;
            color: inherit;
            outline: none;
        }
        .pool-categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
        }
        .pool-cat-btn {
            background: transparent;
            border: none;
            color: #aab6fe;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .pool-cat-btn.active {
            background: #7b8cff;
            color: white;
        }
        .pool-cat-btn:hover:not(.active) {
            background: rgba(255,255,255,0.1);
        }
        .pool-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .pool-item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .pool-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
            border-color: #7b8cff;
        }
        .pool-pair {
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .pool-pair i {
            color: #ffd966;
        }
        .pool-fee {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.4);
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            color: #aab6fe;
        }
        .pool-apr {
            font-weight: 700;
            color: #7bff9c;
            font-size: 1rem;
        }
        .pool-details {
            display: flex;
            gap: 1rem;
            font-size: 0.7rem;
            color: #aab6fe;
        }
        .empty-pools {
            text-align: center;
            padding: 2rem;
            color: #aab6fe;
        }
        .pool-update-info {
            font-size: 0.7rem;
            text-align: right;
            margin-top: 1rem;
            color: #6f7588;
        }

        /* METEOROLOGIA */
        .weather-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
        }
        .weather-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .weather-header h3 {
            color: #ffd966;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .weather-search {
            position: relative;
            flex: 1;
            min-width: 250px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 1.5rem;
        }
        .weather-search i {
            color: #9aa0b0;
            margin-right: 0.8rem;
        }
        .weather-search input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 0.5rem 0;
            color: inherit;
            outline: none;
        }
        .weather-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30,32,45,0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            margin-top: 0.5rem;
            z-index: 100;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        .weather-suggestions div {
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .weather-suggestions div:hover {
            background: rgba(255,255,255,0.1);
        }
        .weather-current {
            background: linear-gradient(135deg, rgba(123,140,255,0.2), rgba(192,124,255,0.1));
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        .weather-temp {
            font-size: 3rem;
            font-weight: 700;
        }
        .weather-temp small {
            font-size: 1rem;
            font-weight: normal;
        }
        .weather-condition {
            text-align: right;
        }
        .weather-condition div {
            font-size: 2rem;
        }
        .weather-details {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .weather-detail-item {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex: 1;
            min-width: 120px;
        }
        .weather-detail-item i {
            font-size: 1.5rem;
            color: #7b8cff;
        }
        .weather-forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.8rem;
        }
        .forecast-day {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 0.8rem;
            text-align: center;
        }
        .forecast-day .day {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .forecast-day .temp {
            font-size: 0.9rem;
        }
        .forecast-day .temp-min {
            color: #aab6fe;
        }

        /* SENTIENT RADAR - NOVO CARD */
        .sentient-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
        }
        .sentient-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }
        .sentient-header h3 {
            color: #ffd966;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sentient-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .sentient-score-card {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 1.2rem;
            text-align: center;
        }
        .sentient-score {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0.5rem 0;
        }
        .sentiment-positive {
            color: #7bff9c;
        }
        .sentiment-neutral {
            color: #ffd966;
        }
        .sentiment-negative {
            color: #ff7b7b;
        }
        .sentient-classification {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .sentient-metrics {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .sentient-metric {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 0.5rem 1rem;
            flex: 1;
            text-align: center;
        }
        .sentient-metric .label {
            font-size: 0.7rem;
            color: #aab6fe;
        }
        .sentient-metric .value {
            font-weight: 700;
            font-size: 1rem;
        }
        .trending-list {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 1.2rem;
        }
        .trending-list h4 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffd966;
        }
        .trending-item {
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .trending-item:last-child {
            border-bottom: none;
        }
        .trending-rank {
            font-weight: 700;
            color: #7b8cff;
            min-width: 30px;
        }
        .trending-topic {
            flex: 1;
        }
        .trending-score {
            font-size: 0.8rem;
            color: #7bff9c;
        }
        .sentient-summary {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .sentient-summary h4 {
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffd966;
        }
        .sentient-summary p {
            line-height: 1.5;
            font-size: 0.9rem;
        }
        .sentient-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .sentient-stat-item {
            flex: 1;
            text-align: center;
            min-width: 100px;
        }
        .sentient-stat-item .label {
            font-size: 0.7rem;
            color: #aab6fe;
        }
        .sentient-stat-item .value {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .news-list {
            background: rgba(255,255,255,0.05);
            border-radius: 28px;
            padding: 1.2rem;
        }
        .news-list h4 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffd966;
            flex-wrap: wrap;
