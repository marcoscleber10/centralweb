<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card • Profissional</title>
    <!-- Google Fonts + Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Variáveis CSS para temas */
        :root {
            --bg-gradient-start: #f8f9fa;
            --bg-gradient-end: #e9ecef;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(255, 255, 255, 0.5);
            --text-primary: #212529;
            --text-secondary: #495057;
            --accent: #4361ee;
            --accent-hover: #3a56d4;
            --stat-bg: rgba(0, 0, 0, 0.03);
            --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.15);
            --icon-filter: none;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #0b0f1a;
            --bg-gradient-end: #1a1f2f;
            --card-bg: rgba(20, 25, 40, 0.8);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f3f5;
            --text-secondary: #adb5bd;
            --accent: #748ffc;
            --accent-hover: #91a7ff;
            --stat-bg: rgba(255, 255, 255, 0.05);
            --shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
            --icon-filter: brightness(0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            transition: background 0.4s ease;
            padding: 1rem;
        }

        /* Card principal com efeito glass */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 2rem;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 420px;
            padding: 2rem 1.5rem 1.8rem;
            transition: all 0.3s ease;
            animation: card-appear 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes card-appear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Cabeçalho do card com botão de tema */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .theme-toggle {
            background: var(--stat-bg);
            border: 1px solid var(--card-border);
            border-radius: 3rem;
            padding: 0.4rem;
            cursor: pointer;
            display: flex;
            gap: 0.3rem;
            transition: all 0.2s;
        }

        .theme-toggle i {
            font-size: 1.2rem;
            padding: 0.5rem;
            border-radius: 50%;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .theme-toggle i.active {
            background: var(--accent);
            color: white;
        }

        /* Avatar */
        .avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .avatar img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card-border);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .avatar img:hover {
            transform: scale(1.05);
        }

        /* Informações do usuário */
        .user-info {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .user-info h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
        }

        .user-info .title {
            font-size: 1rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--stat-bg);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            margin-bottom: 0.8rem;
            border: 1px solid var(--card-border);
        }

        .user-info .bio {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            max-width: 280px;
            margin: 0 auto;
        }

        /* Estatísticas */
        .stats {
            display: flex;
            justify-content: space-around;
            background: var(--stat-bg);
            border-radius: 1.5rem;
            padding: 1rem 0.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid var(--card-border);
            backdrop-filter: blur(4px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Ações (botões) */
        .actions {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            flex: 1;
            padding: 0.8rem 0.2rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px var(--accent);
        }

        .btn-outline:hover {
            background: var(--stat-bg);
            transform: translateY(-2px);
        }

        /* Redes sociais */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            font-size: 1.4rem;
        }

        .social-links a {
            color: var(--text-secondary);
            transition: all 0.2s;
            filter: var(--icon-filter);
        }

        .social-links a:hover {
            color: var(--accent);
            transform: translateY(-3px);
        }

        /* Footer do card */
        .card-footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            border-top: 1px solid var(--card-border);
            padding-top: 1rem;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .profile-card {
                padding: 1.5rem 1rem;
            }
            .actions {
                flex-direction: column;
            }
            .btn {
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card" id="profileCard">
        <div class="card-header">
            <span style="font-weight: 600; color: var(--text-primary);">Perfil</span>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-sun active" data-theme="light"></i>
                <i class="fas fa-moon" data-theme="dark"></i>
            </div>
        </div>

        <div class="avatar">
            <!-- Imagem de placeholder feminina (pode trocar) -->
            <img src="https://randomuser.me/api/portraits/women/44.jpg" alt="Avatar">
        </div>

        <div class="user-info">
            <h2>Isabela Mendes</h2>
            <div class="title">Product Designer</div>
            <p class="bio">Criando experiências digitais com foco em usabilidade e estética. 8+ anos de mercado.</p>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="projectsCount">247</div>
                <div class="stat-label">Projetos</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="followersCount">18.5k</div>
                <div class="stat-label">Seguidores</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="followingCount">364</div>
                <div class="stat-label">Seguindo</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-primary" id="followBtn">
                <i class="fas fa-plus-circle"></i> Seguir
            </button>
            <button class="btn btn-outline" id="messageBtn">
                <i class="fas fa-comment"></i> Mensagem
            </button>
        </div>

        <div class="social-links">
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-dribbble"></i></a>
        </div>

        <div class="card-footer">
            <span>✦ design profissional • atualizado em 2026 ✦</span>
        </div>
    </div>

    <script>
        (function() {
            // Elementos do DOM
            const themeToggle = document.getElementById('themeToggle');
            const themeIcons = themeToggle.querySelectorAll('i');
            const body = document.body;
            const followBtn = document.getElementById('followBtn');

            // --- Gerenciamento de Tema (claro/escuro) ---
            // Verifica preferência salva no localStorage
            const savedTheme = localStorage.getItem('theme') || 'light';
            body.setAttribute('data-theme', savedTheme);
            updateActiveIcon(savedTheme);

            function updateActiveIcon(theme) {
                themeIcons.forEach(icon => {
                    const iconTheme = icon.getAttribute('data-theme');
                    if (iconTheme === theme) {
                        icon.classList.add('active');
                    } else {
                        icon.classList.remove('active');
                    }
                });
            }

            themeToggle.addEventListener('click', (e) => {
                // Se clicou em um ícone específico, pega o tema dele
                let targetTheme = e.target.getAttribute('data-theme');
                if (!targetTheme) return; // clicou no container ou em outro lugar

                const currentTheme = body.getAttribute('data-theme');
                if (currentTheme === targetTheme) return; // já está ativo

                body.setAttribute('data-theme', targetTheme);
                localStorage.setItem('theme', targetTheme);
                updateActiveIcon(targetTheme);
            });

            // --- Interação do botão "Seguir" com microinteração ---
            let isFollowing = false;
            followBtn.addEventListener('click', function() {
                const icon = this.querySelector('i');
                if (!isFollowing) {
                    // Seguir
                    icon.className = 'fas fa-check-circle';
                    this.innerHTML = '<i class="fas fa-check-circle"></i> Seguindo';
                    isFollowing = true;

                    // Incrementa seguidores (simulação)
                    const followersEl = document.getElementById('followersCount');
                    let followers = parseFloat(followersEl.textContent.replace('k', '')) * 1000;
                    followers += 1;
                    if (followers >= 1000) {
                        followersEl.textContent = (followers / 1000).toFixed(1) + 'k';
                    } else {
                        followersEl.textContent = followers;
                    }
                } else {
                    // Deixar de seguir
                    icon.className = 'fas fa-plus-circle';
                    this.innerHTML = '<i class="fas fa-plus-circle"></i> Seguir';
                    isFollowing = false;

                    // Decrementa seguidores
                    const followersEl = document.getElementById('followersCount');
                    let followers = parseFloat(followersEl.textContent.replace('k', '')) * 1000;
                    followers -= 1;
                    if (followers >= 1000) {
                        followersEl.textContent = (followers / 1000).toFixed(1) + 'k';
                    } else {
                        followersEl.textContent = followers;
                    }
                }
            });

            // --- Pequeno efeito no botão mensagem (apenas feedback visual) ---
            document.getElementById('messageBtn').addEventListener('click', function() {
                alert('Funcionalidade de mensagem simulada.\nEm um projeto real, isso abriria um chat.');
            });

            // --- Os links sociais são apenas demonstrativos, não redirecionam ---
            const socialLinks = document.querySelectorAll('.social-links a');
            socialLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    alert('Link simbólico para rede social.');
                });
            });

        })();
    </script>
</body>
</html>
