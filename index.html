<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentralWeb • Hub da Internet</title>
    <!-- Font Awesome 6 (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0c0c14;
            color: #eaeef2;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 1rem;
        }

        body.light-mode {
            background: #f0f2f5;
            color: #1e1e2f;
        }

        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        /* Glassmorphism base */
        .glass-card {
            background: rgba(20, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        /* Header */
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.2rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            background: rgba(20, 22, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #7b8cff, #c07cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-global {
            flex: 1;
            min-width: 260px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .search-global i {
            color: #9aa0b0;
            font-size: 1.2rem;
            margin-right: 0.8rem;
        }

        .search-global input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 0.6rem 0;
            color: inherit;
            font-size: 1rem;
            outline: none;
        }

        .search-global input::placeholder {
            color: #7f8596;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .header-actions button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.light-mode .header-actions button {
            background: rgba(0,0,0,0.05);
            color: #333;
            border-color: rgba(0,0,0,0.1);
        }

        .header-actions button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.07);
        }

        .clock {
            background: rgba(255,255,255,0.08);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .weather-widget {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Barra de favoritos */
        .favorites-bar {
            background: rgba(25, 28, 40, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.7rem 1.8rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .favorites-title {
            font-size: 1rem;
            color: #b5bcd0;
            letter-spacing: 0.5px;
        }

        .favorites-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }

        .favorite-item {
            background: rgba(255,255,255,0.08);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .favorite-item:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.2);
        }

        .favorite-item i:first-child {
            color: #ffb347;
        }

        .favorite-item .fa-times-circle {
            color: #ff7b7b;
            font-size: 0.9rem;
        }

        /* Seção "Uso Diário" (destaque) */
        .daily-section {
            margin-bottom: 2rem;
        }

        .daily-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .daily-title i {
            color: #fbbf24;
        }

        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .daily-item {
            background: rgba(40, 45, 60, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
            cursor: pointer;
        }

        .daily-item:hover {
            transform: translateY(-4px);
            background: rgba(55, 60, 80, 0.8);
            border-color: #7b8cff;
        }

        .daily-item i {
            font-size: 2rem;
            color: #a0b0ff;
        }

        .daily-item span {
            font-weight: 500;
        }

        /* Grid de categorias */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .category-card {
            background: rgba(22, 25, 37, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }

        .category-card:hover {
            transform: translateY(-5px);
            border-color: rgba(130, 150, 255, 0.5);
            box-shadow: 0 25px 40px -12px #2a2f5a;
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
        }

        .category-title i {
            color: #7b8cff;
            font-size: 1.6rem;
        }

        .links-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .link-item {
            background: rgba(255,255,255,0.06);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: inherit;
            font-size: 0.95rem;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .link-item i:first-child {
            font-size: 1.2rem;
            color: #aab6fe;
        }

        .link-item:hover {
            background: rgba(255,255,255,0.12);
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.2);
        }

        .link-item .fa-star {
            margin-left: 0.3rem;
            font-size: 0.9rem;
            color: #6f7588;
            transition: 0.2s;
        }

        .link-item .fa-star:hover {
            color: #fbbf24;
        }

        .link-item .fa-star.favorited {
            color: #fbbf24;
        }

        /* Histórico */
        .history-section {
            background: rgba(22, 25, 37, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.8rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .history-title {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #8e96b0;
            font-size: 0.9rem;
        }

        /* Responsivo */
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: space-between;
            }
            .daily-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        @media (max-width: 480px) {
            .daily-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <h1>CentralWeb</h1>
            </div>
            <div class="search-global">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch" placeholder="Buscar plataforma...">
            </div>
            <div class="header-actions">
                <div class="clock" id="liveClock">--:--:--</div>
                <div class="weather-widget" id="weatherWidget">
                    <i class="fas fa-cloud-sun"></i>
                    <span>22°C • São Paulo</span>
                </div>
                <button id="themeToggle" title="Alternar tema">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="fullscreenBtn" title="Tela cheia">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </header>

        <!-- FAVORITOS -->
        <div class="favorites-bar">
            <span class="favorites-title"><i class="fas fa-star"></i> Favoritos</span>
            <div class="favorites-list" id="favoritesList">
                <!-- preenchido via js -->
            </div>
        </div>

        <!-- SEÇÃO USO DIÁRIO (destaque) -->
        <div class="daily-section">
            <div class="daily-title">
                <i class="fas fa-rocket"></i> ⭐ Uso Diário
            </div>
            <div class="daily-grid" id="dailyGrid">
                <!-- será populado com os principais -->
            </div>
        </div>

        <!-- GRADE DE CATEGORIAS -->
        <div class="categories-grid" id="categoriesGrid"></div>

        <!-- HISTÓRICO -->
        <div class="history-section">
            <div class="history-title">
                <i class="fas fa-history"></i> Últimos acessos
            </div>
            <div class="history-items" id="historyItems"></div>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            <p>© 2026 CentralWeb • Seu hub da internet • <i class="fas fa-bolt"></i> versão avançada</p>
        </footer>
    </div>

    <script>
        (function() {
            // ========== BASE DE DADOS COMPLETA ==========
            const categories = [
                // (as categorias originais já estão aqui, mas adicionaremos as novas)
                { name: "🔍 Busca", icon: "fa-search", links: [
                    { name: "Google", url: "https://www.google.com", icon: "fab fa-google" },
                    { name: "Bing", url: "https://www.bing.com", icon: "fab fa-microsoft" },
                    { name: "DuckDuckGo", url: "https://duckduckgo.com", icon: "fas fa-duck" }
                ]},
                { name: "📱 Redes Sociais", icon: "fa-share-alt", links: [
                    { name: "Instagram", url: "https://instagram.com", icon: "fab fa-instagram" },
                    { name: "Facebook", url: "https://facebook.com", icon: "fab fa-facebook" },
                    { name: "TikTok", url: "https://tiktok.com", icon: "fab fa-tiktok" },
                    { name: "X (Twitter)", url: "https://twitter.com", icon: "fab fa-x-twitter" },
                    { name: "Reddit", url: "https://reddit.com", icon: "fab fa-reddit-alien" }
                ]},
                { name: "🎥 Vídeo & Streaming", icon: "fa-video", links: [
                    { name: "YouTube", url: "https://youtube.com", icon: "fab fa-youtube" },
                    { name: "Netflix", url: "https://netflix.com", icon: "fas fa-film" },
                    { name: "Twitch", url: "https://twitch.tv", icon: "fab fa-twitch" }
                ]},
                { name: "💬 Comunicação", icon: "fa-comments", links: [
                    { name: "WhatsApp Web", url: "https://web.whatsapp.com", icon: "fab fa-whatsapp" },
                    { name: "Discord", url: "https://discord.com", icon: "fab fa-discord" },
                    { name: "Zoom", url: "https://zoom.us", icon: "fas fa-video" }
                ]},
                { name: "🤖 Inteligência Artificial", icon: "fa-robot", links: [
                    { name: "ChatGPT", url: "https://chat.openai.com", icon: "fas fa-comment-dots" },
                    { name: "Gemini", url: "https://gemini.google.com", icon: "fas fa-brain" },
                    { name: "Claude", url: "https://claude.ai", icon: "fas fa-magic" }
                ]},
                // NOVAS CATEGORIAS ALTAMENTE BUSCADAS:
                { name: "🍳 Receitas", icon: "fa-utensils", links: [
                    { name: "TudoGostoso", url: "https://tudogostoso.com.br", icon: "fas fa-utensil-spoon" },
                    { name: "Receitas Globo", url: "https://receitas.globo.com", icon: "fas fa-globe" },
                    { name: "Tasty", url: "https://tasty.co", icon: "fas fa-cookie-bite" }
                ]},
                { name: "💼 Empregos", icon: "fa-briefcase", links: [
                    { name: "LinkedIn", url: "https://linkedin.com", icon: "fab fa-linkedin" },
                    { name: "Indeed", url: "https://indeed.com", icon: "fas fa-building" },
                    { name: "Catho", url: "https://catho.com.br", icon: "fas fa-file-signature" }
                ]},
                { name: "💰 Finanças / Cripto", icon: "fa-chart-line", links: [
                    { name: "TradingView", url: "https://tradingview.com", icon: "fas fa-chart-simple" },
                    { name: "Investing.com", url: "https://investing.com", icon: "fas fa-coins" },
                    { name: "CoinMarketCap", url: "https://coinmarketcap.com", icon: "fas fa-bitcoin-sign" }
                ]},
                { name: "🧠 Educação / Cursos", icon: "fa-graduation-cap", links: [
                    { name: "Coursera", url: "https://coursera.org", icon: "fas fa-laptop" },
                    { name: "Udemy", url: "https://udemy.com", icon: "fas fa-chalkboard-user" },
                    { name: "Khan Academy", url: "https://khanacademy.org", icon: "fas fa-school" }
                ]},
                { name: "🎮 Games", icon: "fa-gamepad", links: [
                    { name: "Steam", url: "https://steampowered.com", icon: "fab fa-steam" },
                    { name: "Epic Games", url: "https://epicgames.com", icon: "fab fa-epic-games" }
                ]},
                { name: "📦 Downloads", icon: "fa-download", links: [
                    { name: "MediaFire", url: "https://mediafire.com", icon: "fas fa-cloud-upload-alt" },
                    { name: "APKMirror", url: "https://apkmirror.com", icon: "fas fa-mobile-alt" }
                ]},
                { name: "🌐 Tradutor", icon: "fa-language", links: [
                    { name: "Google Tradutor", url: "https://translate.google.com", icon: "fas fa-language" },
                    { name: "DeepL", url: "https://deepl.com", icon: "fas fa-gem" }
                ]},
                { name: "🧭 Mapas", icon: "fa-map-location-dot", links: [
                    { name: "Google Maps", url: "https://maps.google.com", icon: "fas fa-map" },
                    { name: "Waze", url: "https://waze.com", icon: "fab fa-waze" }
                ]},
                // Mantendo as categorias anteriores que ainda não foram listadas (E-commerce, Notícias, Informação, Música, Ferramentas)
                { name: "🛒 E-commerce", icon: "fa-cart-shopping", links: [
                    { name: "Amazon", url: "https://amazon.com", icon: "fab fa-amazon" },
                    { name: "Mercado Livre", url: "https://mercadolivre.com.br", icon: "fas fa-store" },
                    { name: "Shopee", url: "https://shopee.com.br", icon: "fas fa-bag-shopping" },
                    { name: "AliExpress", url: "https://aliexpress.com", icon: "fab fa-alipay" }
                ]},
                { name: "📰 Notícias", icon: "fa-newspaper", links: [
                    { name: "CNN", url: "https://cnn.com", icon: "fas fa-globe" },
                    { name: "BBC", url: "https://bbc.com", icon: "fas fa-globe" },
                    { name: "UOL", url: "https://uol.com.br", icon: "fas fa-globe" },
                    { name: "Globo", url: "https://globo.com", icon: "fas fa-globe" }
                ]},
                { name: "📚 Informação", icon: "fa-book", links: [
                    { name: "Wikipedia", url: "https://wikipedia.org", icon: "fab fa-wikipedia-w" },
                    { name: "Quora", url: "https://quora.com", icon: "fab fa-quora" },
                    { name: "Stack Overflow", url: "https://stackoverflow.com", icon: "fab fa-stack-overflow" }
                ]},
                { name: "🎵 Música", icon: "fa-music", links: [
                    { name: "Spotify", url: "https://open.spotify.com", icon: "fab fa-spotify" }
                ]},
                { name: "🛠️ Ferramentas", icon: "fa-tools", links: [
                    { name: "Canva", url: "https://canva.com", icon: "fab fa-canva" },
                    { name: "GitHub", url: "https://github.com", icon: "fab fa-github" },
                    { name: "Adobe", url: "https://adobe.com", icon: "fab fa-adobe" },
                    { name: "WordPress", url: "https://wordpress.com", icon: "fab fa-wordpress" }
                ]}
            ];

            // Lista para a seção "Uso Diário" (destaque)
            const dailyLinks = [
                { name: "Google", url: "https://google.com", icon: "fab fa-google" },
                { name: "WhatsApp", url: "https://web.whatsapp.com", icon: "fab fa-whatsapp" },
                { name: "YouTube", url: "https://youtube.com", icon: "fab fa-youtube" },
                { name: "Google Maps", url: "https://maps.google.com", icon: "fas fa-map" },
                { name: "ChatGPT", url: "https://chat.openai.com", icon: "fas fa-comment-dots" }
            ];

            // ========== ESTADO GLOBAL ==========
            let favorites = JSON.parse(localStorage.getItem('centralweb_favorites')) || [];
            let history = JSON.parse(localStorage.getItem('centralweb_history')) || [];
            let currentTheme = localStorage.getItem('centralweb_theme') || 'dark';

            // ========== ELEMENTOS DOM ==========
            const categoriesGrid = document.getElementById('categoriesGrid');
            const favoritesList = document.getElementById('favoritesList');
            const historyItems = document.getElementById('historyItems');
            const dailyGrid = document.getElementById('dailyGrid');
            const themeToggle = document.getElementById('themeToggle');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const globalSearch = document.getElementById('globalSearch');
            const clockEl = document.getElementById('liveClock');

            // ========== FUNÇÕES DE PERSISTÊNCIA ==========
            function saveFavorites() {
                localStorage.setItem('centralweb_favorites', JSON.stringify(favorites));
            }
            function saveHistory() {
                localStorage.setItem('centralweb_history', JSON.stringify(history));
            }
            function addToHistory(name, url) {
                history = [{ name, url, timestamp: Date.now() }, ...history.filter(h => h.url !== url).slice(0, 9)];
                saveHistory();
                renderHistory();
            }

            // ========== RENDERIZAÇÃO DA SEÇÃO USO DIÁRIO ==========
            function renderDaily() {
                let html = '';
                dailyLinks.forEach(link => {
                    html += `
                        <div class="daily-item" onclick="window.open('${link.url}','_blank'); addToHistory('${link.name}', '${link.url}');">
                            <i class="${link.icon}"></i>
                            <span>${link.name}</span>
                        </div>
                    `;
                });
                dailyGrid.innerHTML = html;
            }

            // ========== RENDERIZAR CATEGORIAS (com filtro) ==========
            function renderCategories(filter = '') {
                const f = filter.toLowerCase();
                let html = '';
                categories.forEach(cat => {
                    const filteredLinks = cat.links.filter(l => l.name.toLowerCase().includes(f) || cat.name.toLowerCase().includes(f));
                    if (filteredLinks.length === 0 && f !== '') return;
                    html += `<div class="category-card"><div class="category-title"><i class="fas ${cat.icon}"></i> ${cat.name}</div><div class="links-list">`;
                    filteredLinks.forEach(link => {
                        const isFav = favorites.some(f => f.url === link.url);
                        html += `<a href="${link.url}" target="_blank" class="link-item" data-url="${link.url}" data-name="${link.name}">
                            <i class="${link.icon}"></i> ${link.name}
                            <i class="fas fa-star ${isFav ? 'favorited' : ''}" onclick="event.preventDefault(); event.stopPropagation(); toggleFavorite('${link.name}', '${link.url}', '${link.icon}')"></i>
                        </a>`;
                    });
                    html += '</div></div>';
                });
                categoriesGrid.innerHTML = html;
            }

            // ========== RENDERIZAR FAVORITOS ==========
            function renderFavorites() {
                if (favorites.length === 0) {
                    favoritesList.innerHTML = '<span style="color:#aaa;">Nenhum favorito</span>';
                    return;
                }
                favoritesList.innerHTML = favorites.map(f => `
                    <div class="favorite-item" onclick="window.open('${f.url}','_blank'); addToHistory('${f.name}', '${f.url}');">
                        <i class="${f.icon}"></i> ${f.name}
                        <i class="fas fa-times-circle" onclick="event.stopPropagation(); removeFavorite('${f.url}')"></i>
                    </div>
                `).join('');
            }

            // ========== RENDERIZAR HISTÓRICO ==========
            function renderHistory() {
                if (history.length === 0) {
                    historyItems.innerHTML = '<span style="color:#aaa;">Nenhum acesso recente</span>';
                    return;
                }
                historyItems.innerHTML = history.map(h => `
                    <div class="history-item" onclick="window.open('${h.url}','_blank'); addToHistory('${h.name}', '${h.url}');">
                        <i class="fas fa-clock"></i> ${h.name}
                    </div>
                `).join('');
            }

            // ========== FUNÇÕES DE FAVORITO (expostas globalmente) ==========
            window.toggleFavorite = (name, url, icon) => {
                const idx = favorites.findIndex(f => f.url === url);
                if (idx >= 0) favorites.splice(idx, 1);
                else favorites.push({ name, url, icon });
                saveFavorites();
                renderFavorites();
                renderCategories(globalSearch.value);
            };

            window.removeFavorite = (url) => {
                favorites = favorites.filter(f => f.url !== url);
                saveFavorites();
                renderFavorites();
                renderCategories(globalSearch.value);
            };

            // ========== TEMA ==========
            function applyTheme(theme) {
                if (theme === 'light') {
                    document.body.classList.add('light-mode');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                } else {
                    document.body.classList.remove('light-mode');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                }
                localStorage.setItem('centralweb_theme', theme);
            }

            themeToggle.addEventListener('click', () => {
                const newTheme = document.body.classList.contains('light-mode') ? 'dark' : 'light';
                applyTheme(newTheme);
            });

            // ========== TELA CHEIA ==========
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });

            // ========== BUSCA GLOBAL ==========
            globalSearch.addEventListener('input', (e) => renderCategories(e.target.value));

            // ========== RELÓGIO ==========
            function updateClock() {
                const now = new Date();
                clockEl.textContent = now.toLocaleTimeString('pt-BR', { hour12: false });
            }
            setInterval(updateClock, 1000);
            updateClock();

            // ========== REGISTRAR CLIQUE EM LINKS PARA HISTÓRICO ==========
            document.addEventListener('click', (e) => {
                const link = e.target.closest('.link-item');
                if (link && link.href) {
                    const name = link.dataset.name;
                    const url = link.dataset.url;
                    if (name && url) addToHistory(name, url);
                }
            });

            // ========== INICIALIZAÇÃO ==========
            function init() {
                applyTheme(currentTheme);
                renderDaily();
                renderCategories();
                renderFavorites();
                renderHistory();
            }

            init();

            // expor addToHistory globalmente
            window.addToHistory = addToHistory;
        })();
    </script>
</body>
</html>
